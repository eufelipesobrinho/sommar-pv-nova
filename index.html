<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/favicon.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sommar App — Controle Financeiro Inteligente</title>

    <!-- Fontes: preconnect mínimo + carga não-bloqueante (evita @import no CSS) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Sora:wght@500;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Sora:wght@500;700;800&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Sora:wght@500;700;800&display=swap"
      />
    </noscript>

    <!-- YouTube: só dns-prefetch (não compete com LCP no WebView). Conexão real sob demanda no play. -->
    <link rel="dns-prefetch" href="https://i.ytimg.com" />
    <link rel="dns-prefetch" href="https://www.youtube-nocookie.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Clarity + Meta Pixel: adiados após first paint (crítico no Instagram Android WebView) -->
    <script>
      (function () {
        function loadThirdParty() {
          // Microsoft Clarity
          (function (c, l, a, r, i, t, y) {
            c[a] =
              c[a] ||
              function () {
                (c[a].q = c[a].q || []).push(arguments);
              };
            t = l.createElement(r);
            t.async = 1;
            t.src = 'https://www.clarity.ms/tag/' + i;
            y = l.getElementsByTagName(r)[0];
            y.parentNode.insertBefore(t, y);
          })(window, document, 'clarity', 'script', 'xkdk6yc1x7');

          // Meta Pixel
          !(function (f, b, e, v, n, t, s) {
            if (f.fbq) return;
            n = f.fbq = function () {
              n.callMethod
                ? n.callMethod.apply(n, arguments)
                : n.queue.push(arguments);
            };
            if (!f._fbq) f._fbq = n;
            n.push = n;
            n.loaded = !0;
            n.version = '2.0';
            n.queue = [];
            t = b.createElement(e);
            t.async = !0;
            t.src = v;
            s = b.getElementsByTagName(e)[0];
            s.parentNode.insertBefore(t, s);
          })(
            window,
            document,
            'script',
            'https://connect.facebook.net/en_US/fbevents.js',
          );
          fbq('init', '1650440006207697');
          fbq('track', 'PageView');
        }

        function schedule() {
          if ('requestIdleCallback' in window) {
            requestIdleCallback(loadThirdParty, { timeout: 2500 });
          } else {
            setTimeout(loadThirdParty, 1800);
          }
        }

        if (document.readyState === 'complete') schedule();
        else window.addEventListener('load', schedule);
      })();
    </script>
  </body>
</html>
